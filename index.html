<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas - Consórcio Comauto</title>
    <!-- Bibliotecas Essenciais -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts para Tipografia Fina e Moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #0f172a; 
            --comauto-blue: #0b2341;
            --success-green: #10b981;
            --success-bg: #ecfdf5;
            --bg-main: #f8fafc;
            --card-border: #f1f5f9;
            --text-main: #334155;
            --text-muted: #64748b;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s ease;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar Elegante e Clean */
        .navbar { 
            background-color: white; 
            padding: 20px 50px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid var(--card-border);
        }
        .navbar img { height: 50px; width: auto; object-fit: contain; }
        .navbar .title-container { text-align: right; }
        .navbar .main-title { font-size: 20px; font-weight: 700; color: var(--comauto-blue); margin: 0; letter-spacing: -0.5px; }
        .navbar .sub-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin: 4px 0 0 0; }

        /* Grid de Conteúdo com Lindo Respiro */
        .container { 
            max-width: 1300px; 
            margin: 40px auto; 
            padding: 0 30px; 
            display: grid; 
            grid-template-columns: 1.15fr 1fr; 
            gap: 40px; 
        }
        @media(max-width: 1024px) { .container { grid-template-columns: 1fr; gap: 30px; } }

        /* Cards Flutuantes e Modernos */
        .card { 
            background: white; 
            padding: 35px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03);
            border: 1px solid var(--card-border);
        }
        
        h2 { 
            color: var(--comauto-blue); 
            font-size: 15px; 
            font-weight: 700;
            margin-top: 0; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: var(--comauto-blue);
            border-radius: 2px;
        }
        
        .section-divider {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #f1f5f9;
        }

        /* Inputs e Formulários Refinados */
        .form-group { margin-bottom: 20px; }
        label { 
            font-weight: 600; 
            font-size: 11px; 
            display: block; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 500; 
            color: var(--primary-dark);
            background-color: #fff;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--comauto-blue); 
            box-shadow: 0 0 0 4px rgba(11, 35, 65, 0.06); 
        }
        input[readonly] {
            background-color: var(--bg-main);
            border-color: var(--card-border);
            color: var(--text-muted);
        }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Botões Estilo Premium */
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        button { 
            flex: 1; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
        }
        .btn-calc { 
            background-color: var(--bg-main); 
            color: var(--comauto-blue); 
            border: 1px solid #cbd5e1;
        }
        .btn-calc:hover { background-color: #e2e8f0; }
        
        .btn-pdf { 
            background-color: var(--comauto-blue); 
            color: white; 
            box-shadow: 0 4px 12px rgba(11, 35, 65, 0.15);
        }
        .btn-pdf:hover { background-color: #051224; transform: translateY(-1px); }

        /* Caixa de Resultados Clean */
        .result-box { 
            background: var(--bg-main); 
            padding: 24px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid var(--card-border);
        }
        .result-box.highlight { 
            border-color: rgba(16, 185, 129, 0.2); 
            background: var(--success-bg); 
        }
        .res-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .res-val { font-size: 28px; font-weight: 800; color: var(--comauto-blue); margin: 6px 0; letter-spacing: -0.5px; }
        .res-desc { font-size: 13px; color: var(--text-main); line-height: 1.6; }
        
        .chart-container { position: relative; margin-top: 35px; height: 300px; }
    </style>
</head>
<body>

<div class="navbar">
    <img id="imgLogo" src="logo.png" alt="Consórcio Comauto" onload="logoCarregada()" onerror="this.style.display='none'; document.getElementById('fallbackTitle').style.display='block';">
    <div id="fallbackTitle" class="main-title" style="display:none;">CONSÓRCIO COMAUTO</div>
    <div class="title-container">

</div>

            </div>

                    <option value="PF" selected>Pessoa Física</option>
                    <option value="PJ">Pessoa Jurídica</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="credito">Valor do Crédito</label>
                <select id="credito" onchange="calcularTudo()"></select>
            </div>
            <div class="form-group">
                <label for="tipoParcela">Modalidade da Parcela</label>
                <select id="tipoParcela" onchange="atualizarTaxaAdm()">
                    <option value="linear">Linear (100%)</option>
                    <option value="reduzida">Reduzida (75%) - Apenas Grupo 51</option>
                    <option value="leve">Leve (50%)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="taxaAdm">Taxa de Administração (%)</label>
                <input type="number" id="taxaAdm" value="22" readonly>
            </div>
            <div class="form-group">
                <label for="comSeguro">Seguro de Vida</label>
                <input type="text" id="comSeguro" value="Incluso em Tabela" readonly>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="valorLance">Lance Estratégico Ofertado (R$)</label>
                <input type="number" id="valorLance" value="9000" oninput="calcularTudo()">
            </div>
            <div class="form-group">
                <label for="mesContemplacao">Mês da Contemplação</label>
                <input type="number" id="mesContemplacao" value="1" min="1" oninput="calcularTudo()">
            </div>
        </div>

        <h2 class="section-divider">Mercado Bancário (Financiamento)</h2>
        <div class="row">
            <div class="form-group">
                <label id="labelPrazoFinanc" for="prazoFinanciamento">Prazo do Financiamento Imobiliário</label>
                <select id="prazoFinanciamento" onchange="calcularTudo()">
                    <!-- Preenchido automaticamente via JS baseado no grupo -->
                </select>
            </div>
            <div class="form-group">
                <label id="labelJurosFinanc" for="jurosFinanc">Taxa Juros Banco (% a.a. + TR)</label>
                <input type="number" id="jurosFinanc" value="11.70" step="0.01" oninput="calcularTudo()">
            </div>
        </div>
        <div class="form-group">
            <label for="entradaFinanc">Valor de Entrada no Banco (R$)</label>
            <input type="number" id="entradaFinanc" value="0" oninput="calcularTudo()">
        </div>

        <div class="btn-group">
            <button class="btn-calc" onclick="calcularTudo()">📊 Atualizar Dados</button>
            <button class="btn-pdf" onclick="exportarPDFPropostaViva()">📄 Imprimir Proposta PDF</button>
        </div>
    </div>

    <div class="card">
        <h2>Painel Comparativo</h2>
        <div class="result-box">
            <div class="res-label">Consórcio Comauto (Parcela Inicial)</div>
            <div class="res-val" id="resConsorcio">R$ 0,00</div>
            <div class="res-desc" id="descConsorcio"></div>
        </div>
        <div class="result-box">
            <div class="res-label" id="labelFinanc">Financiamento Bancário</div>
            <div class="res-val" id="resFinanc">R$ 0,00</div>
            <div class="res-desc" id="descFinanc"></div>
        </div>
        <div class="result-box highlight">
            <div class="res-label" style="color: var(--success-green);">Economia Real Gerada</div>
            <div class="res-val" id="resEconomia" style="color: var(--success-green);">R$ 0,00</div>
        </div>
        <div class="chart-container">
            <canvas id="graficoComparativo"></canvas>
        </div>
    </div>
</div>

let chartInstance = null;
let base64Logo = null;

function logoCarregada() {
    const img = document.getElementById("imgLogo");
    const canvas = document.createElement("canvas");
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    base64Logo = canvas.toDataURL("image/png");
}

function atualizarTaxaAdm() {
    const grupo = document.getElementById("grupo").value;
    const tipoParcela = document.getElementById("tipoParcela").value;
    let taxa = 15;

    if (grupo === "51") {
        taxa = 22; 
    } else if (tipoParcela === "leve" || tipoParcela === "reduzida") {
        taxa = 19; 
    }
    
    document.getElementById("taxaAdm").value = taxa;
    calcularTudo();
}

function atualizarCampos() {
    const grupo = document.getElementById("grupo").value;
    const perfil = document.getElementById("perfil").value;
    const selectCredito = document.getElementById("credito");
    const selectPrazoFinanc = document.getElementById("prazoFinanciamento");
    const labelPrazo = document.getElementById("labelPrazoFinanc");
    const labelJuros = document.getElementById("labelJurosFinanc");
    const inputJuros = document.getElementById("jurosFinanc");
    
    const plano = bancoDadosComauto[grupo];
    
    // 1. Atualizar Créditos
    selectCredito.innerHTML = "";
    if (plano && plano[perfil]) {
        Object.keys(plano[perfil]).forEach(credito => {
            let opt = document.createElement("option");
            opt.value = credito;
            opt.textContent = `R$ ${parseInt(credito).toLocaleString('pt-BR')},00`;
            selectCredito.appendChild(opt);
        });
    }
    
    // 2. INTEGRAÇÃO INTELIGENTE DE IMÓVEL VS VEÍCULO
    selectPrazoFinanc.innerHTML = "";
    if (grupo === "51") {
        // Regras para Financiamento de Imóvel
        labelPrazo.textContent = "Prazo do Financiamento Imobiliário";
        labelJuros.textContent = "Taxa Juros Banco (% a.a. + TR)";
        inputJuros.value = "11.70"; // Média do mercado imobiliário
        
        const prazosImovel = [240, 360, 420];
        prazosImovel.forEach(p => {
            let opt = document.createElement("option");
            opt.value = p;
            opt.textContent = `${p} meses (Até 35 anos)`;
            if(p === 360) opt.selected = true;
            selectPrazoFinanc.appendChild(opt);
        });
    } else {
        // Regras para Veículos
        labelPrazo.textContent = "Prazo do Financiamento Bancário";
        labelJuros.textContent = "Taxa Juros Banco (% a.m.)";
        inputJuros.value = "2.00"; // Média de mercado auto
        
        const prazosAuto = [36, 48, 60];
        prazosAuto.forEach(p => {
            let opt = document.createElement("option");
            opt.value = p;
            opt.textContent = `${p} meses`;
            if(p === 60) opt.selected = true;
            selectPrazoFinanc.appendChild(opt);
        });
    }
    
    atualizarTaxaAdm();
}

function formatarMoeda(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function calcularTudo() {
    const grupo = document.getElementById("grupo").value;
    const perfil = document.getElementById("perfil").value;
    const credito = parseFloat(document.getElementById("credito").value) || 0;
    let tipoParcela = document.getElementById("tipoParcela").value;
    const valorLance = parseFloat(document.getElementById("valorLance").value) || 0;
    const mesContemplacao = parseInt(document.getElementById("mesContemplacao").value) || 1;
    const prazoFinanc = parseInt(document.getElementById("prazoFinanciamento").value) || 60;
    
    if (!credito) return;

    const plano = bancoDadosComauto[grupo];
    const prazo = plano.prazo;
    
    if (grupo !== "51" && tipoParcela === "reduzida") {
        tipoParcela = "linear";
        document.getElementById("tipoParcela").value = "linear";
    }

    const parcelaC = plano[perfil][credito][tipoParcela] || plano[perfil][credito]["linear"];
    const parcelaLinearCheia = plano[perfil][credito]["linear"];
    
    const totalConsorcioAteFim = parcelaLinearCheia * prazo; 
    
    let novaParcelaPostLance = 0;
    const mesesRestantes = prazo - mesContemplacao;

    if (tipoParcela === "linear") {
        const saldoAposDescontarLance = totalConsorcioAteFim - (parcelaLinearCheia * mesContemplacao) - valorLance;
        novaParcelaPostLance = saldoAposDescontarLance / mesesRestantes;
    } else {
        const diferencaAcumuladaNaoPaga = (parcelaLinearCheia - parcelaC) * mesContemplacao;
        const saldoDevedorFaltanteOriginal = parcelaLinearCheia * mesesRestantes;
        const saldoDevedorTotalNaAssembleia = saldoDevedorFaltanteOriginal + diferencaAcumuladaNaoPaga;
        const saldoAposDescontarLance = saldoDevedorTotalNaAssembleia - valorLance;
        novaParcelaPostLance = saldoAposDescontarLance / mesesRestantes;
    }
    
    let textoLance = `Parcela de Tabela Comauto: <strong>${formatarMoeda(parcelaC)}</strong>.`;
    if (valorLance > 0) {
        textoLance += `<br>Nova parcela reduzida pós-lance no mês ${mesContemplacao}: <strong>${formatarMoeda(novaParcelaPostLance)}/mês</strong>.`;
    }
    
    // CONVERSÃO E CÁLCULO DE JUROS INTELIGENTE
    let taxaJurosInput = parseFloat(document.getElementById("jurosFinanc").value) || 0;
    let taxaJurosMensal = 0;
    
    if (grupo === "51") {
        // Se for imóvel, converte a taxa anual informada para mensal composto: (1 + i_ano)^(1/12) - 1
        taxaJurosMensal = Math.pow(1 + (taxaJurosInput / 100), 1 / 12) - 1;
    } else {
        // Se for auto, usa a taxa direta ao mês
        taxaJurosMensal = taxaJurosInput / 100;
    }

    const entrada = parseFloat(document.getElementById("entradaFinanc").value) || 0;
    const valorFinanciado = credito - entrada;
    
    let parcelaF = taxaJurosMensal > 0 ? (valorFinanciado * (taxaJurosMensal * Math.pow(1 + taxaJurosMensal, prazoFinanc)) / (Math.pow(1 + taxaJurosMensal, prazoFinanc) - 1)) : (valorFinanciado / prazoFinanc);
    const totalFinanc = (parcelaF * prazoFinanc) + entrada;
    const economy = totalFinanc - totalConsorcioAteFim;
    
    document.getElementById("resConsorcio").textContent = `${formatarMoeda(parcelaC)} /mês`;
    document.getElementById("descConsorcio").innerHTML = textoLance;
    
    document.getElementById("labelFinanc").textContent = `Financiamento Bancário (${prazoFinanc} Meses)`;
    document.getElementById("resFinanc").textContent = `${formatarMoeda(parcelaF)} /mês`;
    document.getElementById("descFinanc").textContent = `Investimento total com o banco: ${formatarMoeda(totalFinanc)}`;
    
    document.getElementById("resEconomia").textContent = formatarMoeda(economy);
    
    desenharGrafico(totalConsorcioAteFim, totalFinanc);
}

function desenharGrafico(c, f) {
    const ctx = document.getElementById('graficoComparativo').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Consórcio Comauto', 'Financiamento Bancário'],
            datasets: [{
                label: 'Custo Contratual Total',
                data: [c, f],
                backgroundColor: ['#0b2341', '#94a3b8'],
                borderRadius: 6,
                barThickness: 32
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
        }
    });
}
